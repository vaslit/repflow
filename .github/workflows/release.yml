name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Extract version
        id: version
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME#v}"
          file_name="$(grep '^appVersionName=' gradle.properties | cut -d'=' -f2)"
          file_code="$(grep '^appVersionCode=' gradle.properties | cut -d'=' -f2)"

          if [ -z "$file_name" ] || [ -z "$file_code" ]; then
            echo "Version properties are missing in gradle.properties"
            exit 1
          fi

          if [ "$tag_name" != "$file_name" ]; then
            echo "Tag version $tag_name does not match gradle.properties version $file_name"
            exit 1
          fi

          echo "name=$file_name" >> "$GITHUB_OUTPUT"
          echo "code=$file_code" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: >
          gradle
          -PappVersionName=${{ steps.version.outputs.name }}
          -PappVersionCode=${{ steps.version.outputs.code }}
          testDebugUnitTest
          --stacktrace

      - name: Build release APK
        run: >
          gradle
          -PappVersionName=${{ steps.version.outputs.name }}
          -PappVersionCode=${{ steps.version.outputs.code }}
          assembleRelease
          --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk
