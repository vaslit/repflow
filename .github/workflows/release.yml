name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Extract version
        id: version
        run: |
          echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Build release APK
        run: >
          gradle
          -PappVersionName=${{ steps.version.outputs.name }}
          -PappVersionCode=${{ steps.version.outputs.code }}
          assembleRelease
          --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk
