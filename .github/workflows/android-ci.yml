name: Android CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          base_name="$(grep '^appVersionName=' gradle.properties | cut -d'=' -f2)"
          if [ -z "$base_name" ]; then
            base_name="0.1.0"
          fi
          echo "name=${base_name}-ci.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: >
          gradle
          -PappVersionName=${{ steps.version.outputs.name }}
          -PappVersionCode=${{ steps.version.outputs.code }}
          testDebugUnitTest
          --stacktrace

      - name: Assemble debug APK
        run: >
          gradle
          -PappVersionName=${{ steps.version.outputs.name }}
          -PappVersionCode=${{ steps.version.outputs.code }}
          assembleDebug
          --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: repflow-debug-apk-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
